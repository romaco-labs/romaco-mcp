name: CI

# Build + test gate. Runs on every PR into main (and on pushes to main, so the
# trunk's HEAD is always verified). Pure TS — no Rust/WASM needed.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
